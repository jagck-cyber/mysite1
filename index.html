<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>筋トレ タイマー</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>トレーニー タイマー</h1>
    <p>休憩時間を設定して筋トレをしよう</p>
  </header>

  <main>
    <section class="a12">
      <p>REST TIMER</p>

      <div class="timer-dsp">02:00</div>
      
      <div class="timer123">
        <button class="b34">30秒</button>
        <button class="b34">1分</button>
        <button class="b34">1.5分</button>
        <button class="b34" >2分</button>
        <button class="b34">3分</button>
        <button class="b34">5分</button>
      </div>
  
      <div class="switch">
        <button class="btn btn-st">スタート</button>
        <button class="btn btn-rt">リセット</button>
      </div>
    </section>

  <section class="pawer">
    <h2>インターバルの目安</h2>
    <div class="power-123">

      <div class="power987">
        <h3>筋肥大</h3>
        <p>推奨：2〜3分</p>
        <p class="small">PCr再合成に必要な時間。</p><p>※PCrとは、エネルギー源の1つ。</p>
      </div>

      <div class="power987">
        <h3>筋持久力</h3>
        <p>推奨：30〜60秒</p>
        <p class="small">代謝ストレスで持久力を高めれる時間。</p>
      </div>

      <div class="power987">
        <h3>最大筋力向上</h3>
        <p>推奨：3〜5分</p>
        <p class="small">神経系の完全回復に必要な時間。</p>
      </div>
    </div>
  </section>
</body>
</html>
